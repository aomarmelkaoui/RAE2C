function setLang(l){

function kpiTotal(){

}
function drawSB(){
  const l=g('rlist');l.innerHTML='';const t=T[lang];
  R[lang].forEach(r=>{
    const b=document.createElement('button');
    b.className='rbtn'+(r.id===cur?' on':'');

    b.onclick=()=>pick(r.id);l.appendChild(b);
  });
}
function pick(id){
  cur=id;const t=T[lang];const r=R[lang].find(x=>x.id===id);drawSB();

  g('d1').textContent=r.e+t.d1s;g('d2').textContent=r.a.toLocaleString('fr-FR');g('d3').textContent=r.t;
  g('ttit').textContent=t.ttp+' '+r.s;

  });
}
