<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>RAE2C — Plateforme Nationale</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Tajawal:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/tabler-icons.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --b0:#020B18;--b1:#061429;--b2:#0D2856;--b3:#1442A0;--b4:#1E56C8;--b5:#3B82F6;
  --b6:#60A5FA;--b8:#BFDBFE;--b9:#DBEAFE;--b10:#EFF6FF;
  --cy:#06B6D4;--sl:#475569;--tx:#0F172A;
  --rose:#E11D48;--amber:#D97706;--emerald:#059669;--purple:#534AB7;--teal:#0F6E56;--teal-dark:#085041;
}
html,body{height:100%;font-family:'Cairo',sans-serif;background:var(--b10);color:var(--tx)}
body.ar{font-family:'Tajawal',sans-serif;direction:rtl}

/* PAGES */
.page{display:none;flex-direction:column;min-height:100vh}
.page.active{display:flex}

/* LANG BAR */
.lang-bar{background:var(--b0);padding:5px 24px;display:flex;align-items:center;justify-content:flex-end;gap:8px;flex-shrink:0}
body.ar .lang-bar{justify-content:flex-start}
.ll{font-size:11px;color:rgba(255,255,255,.35);font-weight:600}
.lbtn{font-size:11px;font-weight:800;padding:3px 11px;border-radius:14px;cursor:pointer;border:1.5px solid rgba(255,255,255,.15);background:transparent;color:rgba(255,255,255,.45);transition:all .2s;font-family:inherit}
.lbtn.on{background:var(--b4);color:#fff;border-color:var(--b5)}
.lbtn:hover:not(.on){background:rgba(255,255,255,.08);color:#fff}

/* HEADER */
.hdr{background:linear-gradient(135deg,var(--b0) 0%,var(--b1) 45%,var(--b2) 100%);border-bottom:3px solid var(--b4);position:relative;overflow:hidden;flex-shrink:0}
.hdr::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 75% 50%,rgba(30,86,200,.2) 0%,transparent 55%),radial-gradient(ellipse at 15% 60%,rgba(6,182,212,.12) 0%,transparent 45%)}
.hdr-in{position:relative;display:flex;align-items:center;gap:18px;padding:14px 28px}
body.ar .hdr-in{flex-direction:row-reverse}
.logo-box{width:88px;height:88px;background:transparent;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;padding:0;box-shadow:none}
.logo-box img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.hdr-txt{flex:1}
body.ar .hdr-txt{text-align:right}
.hdr-sur{font-size:13px;font-weight:700;letter-spacing:2px;color:var(--b6);text-transform:uppercase;margin-bottom:4px}
.hdr-t1{font-size:15px;font-weight:700;color:rgba(255,255,255,.7);margin-bottom:4px}
.hdr-t2{font-size:26px;font-weight:900;color:#fff}
.hdr-right{display:flex;flex-direction:column;gap:6px;align-items:flex-end}
body.ar .hdr-right{align-items:flex-start}
.bdg{font-size:12px;font-weight:800;padding:5px 14px;border-radius:20px}
.bdg-cy{background:var(--cy);color:#fff}
.bdg-user{background:rgba(255,255,255,.1);color:rgba(255,255,255,.8);border:1px solid rgba(255,255,255,.2);display:flex;align-items:center;gap:6px;cursor:pointer;border-radius:20px}
.bdg-user:hover{background:rgba(255,255,255,.18)}

/* NAV */
.nav{background:var(--b2);padding:0 24px;display:flex;align-items:center;gap:2px;overflow-x:auto;border-bottom:1px solid rgba(255,255,255,.07);flex-shrink:0}
body.ar .nav{flex-direction:row-reverse}
.ni{padding:8px 12px;font-size:12px;font-weight:700;color:rgba(255,255,255,.82);cursor:pointer;border-bottom:3px solid transparent;border-top:none;border-left:none;border-right:none;white-space:nowrap;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;font-family:inherit;min-width:70px}
.ni-ico{font-size:22px;line-height:1;filter:brightness(1.3)}
.ni:hover{color:#fff;filter:brightness(1.1)}
.ni.act{color:#fff;border-bottom-color:var(--cy);filter:brightness(1.2)}
.ni.ext{color:#22EAF0;border:1.5px solid rgba(6,182,212,.6);border-radius:8px;margin:5px 3px;text-shadow:0 0 8px rgba(6,182,212,.4)}
.ni.ext:hover{background:rgba(6,182,212,.15);color:#fff}
.nspc{flex:1}

/* MAIN SPLIT */
.main-split{display:flex;flex:1;overflow:hidden;min-height:0}
body.ar .main-split{flex-direction:row-reverse}

/* SIDEBAR */
.sidebar{width:265px;min-width:265px;background:var(--b1);border-right:1px solid rgba(255,255,255,.07);display:flex;flex-direction:column;overflow-y:auto}
body.ar .sidebar{border-right:none;border-left:1px solid rgba(255,255,255,.07)}
.sb-hd{padding:14px 16px 10px;border-bottom:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.03);flex-shrink:0}
.sb-hd h3{font-size:12px;font-weight:800;color:var(--b6);letter-spacing:2px;text-transform:uppercase}
.sb-hd p{font-size:13px;color:rgba(255,255,255,.3);margin-top:2px}
.rlist{flex:1;padding:8px 10px;display:flex;flex-direction:column;gap:3px;overflow-y:auto}
.rbtn{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;cursor:pointer;border:1.5px solid transparent;background:transparent;transition:all .2s;text-align:left;width:100%;font-family:inherit}
body.ar .rbtn{text-align:right;flex-direction:row-reverse}
.rbtn:hover{background:rgba(59,130,246,.18);border-color:rgba(96,165,250,.3)}
.rbtn.on{background:linear-gradient(135deg,var(--b4),var(--b3));border-color:var(--b5);box-shadow:0 4px 14px rgba(30,86,200,.4)}
.rnum{width:26px;height:26px;border-radius:7px;background:rgba(255,255,255,.07);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:rgba(255,255,255,.35);flex-shrink:0}
.rbtn.on .rnum{background:rgba(255,255,255,.22);color:#fff}
.rnfo{flex:1;min-width:0}
.rnm{font-size:14px;font-weight:700;color:rgba(255,255,255,.62);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rbtn:hover .rnm,.rbtn.on .rnm{color:#fff}
.rsub{font-size:11.5px;color:rgba(255,255,255,.28);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rbtn.on .rsub{color:rgba(255,255,255,.55)}
.rcnt{font-size:11px;font-weight:800;border-radius:12px;padding:2px 8px;flex-shrink:0;background:rgba(255,255,255,.07);color:rgba(255,255,255,.3)}
.rbtn.on .rcnt{background:rgba(255,255,255,.2);color:#fff}
.si-box{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:10px 14px;margin:10px;display:flex;flex-direction:column;gap:4px;flex-shrink:0}
.si-role{font-size:12px;font-weight:800;color:var(--b6);letter-spacing:1px;text-transform:uppercase}
.si-name{font-size:15px;font-weight:700;color:#fff}
.si-out{font-size:11px;color:rgba(255,255,255,.35);cursor:pointer;background:none;border:none;font-family:inherit;text-align:left;padding:2px 0}
body.ar .si-out{text-align:right}
.si-out:hover{color:var(--rose)}

/* CONTENT AREA */
.content-area{flex:1;display:flex;flex-direction:column;overflow-y:auto;min-width:0}

/* KPI BAND */
.kpi-band{display:grid;grid-template-columns:repeat(4,1fr);background:#fff;border-bottom:1px solid #e2e8f0;flex-shrink:0}
.kc{padding:20px 22px;border-right:1px solid #f1f5f9;position:relative;transition:background .2s}
.kc:last-child{border-right:none}
body.ar .kc{border-right:none;border-left:1px solid #f1f5f9;text-align:right}
body.ar .kc:last-child{border-left:none}
.kc:hover{background:var(--b10)}
.kacc{width:3px;height:36px;border-radius:2px;position:absolute;left:0;top:50%;transform:translateY(-50%)}
body.ar .kacc{left:auto;right:0}
.klbl{font-size:12px;color:var(--sl);letter-spacing:.8px;font-weight:700;text-transform:uppercase;margin-bottom:4px}
.kval{font-size:32px;font-weight:900;color:var(--tx);line-height:1;margin-bottom:4px}
.kdelta{font-size:13px;color:var(--emerald);font-weight:700}

/* MODULE AREA */
.mod-area{flex:1;overflow-y:auto;padding:20px}

/* CARDS */
.card{background:#fff;border:1px solid #e2e8f0;border-radius:14px;overflow:hidden;margin-bottom:16px}
.card-head{padding:18px 22px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #f1f5f9;background:linear-gradient(90deg,var(--b10),#fff)}
body.ar .card-head{flex-direction:row-reverse;background:linear-gradient(270deg,var(--b10),#fff)}
.card-title{font-size:18px;font-weight:800;color:var(--tx);display:flex;align-items:center;gap:8px}
.card-body{padding:16px 18px}

/* TABLE */
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{padding:14px 20px;font-size:13px;font-weight:800;color:var(--sl);text-transform:uppercase;letter-spacing:.5px;text-align:left;background:#f8fafc;border-bottom:1px solid #f1f5f9;white-space:nowrap;cursor:pointer}
th:hover{background:#f1f5f9}
body.ar th{text-align:right}
td{padding:16px 20px;font-size:16px;color:var(--tx);border-bottom:1px solid #f8fafc;white-space:nowrap}
body.ar td{text-align:right}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--b10);cursor:pointer}
tr.sel td{background:var(--b9)!important}

/* TAGS */
.tag{display:inline-flex;font-size:13px;font-weight:700;padding:4px 12px;border-radius:8px}
.tag-ok{background:#DCFCE7;color:#166534}
.tag-warn{background:#FEF3C7;color:#92400E}
.tag-err{background:#FEE2E2;color:#991B1B}
.tag-info{background:var(--b9);color:var(--b3)}

/* PROGRESS */
.pb{height:5px;border-radius:3px;background:#f1f5f9;margin-top:3px;min-width:60px}
.pb-fill{height:100%;border-radius:3px}

/* AVATAR */
.av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;flex-shrink:0}
.av-f{background:linear-gradient(135deg,var(--rose),#FB7185)}
.av-m{background:linear-gradient(135deg,var(--b4),var(--b5))}
.td-cell{display:flex;align-items:center;gap:9px}

/* FICHE PANEL */
.fiche{width:340px;min-width:340px;background:#fff;border-left:1px solid #e2e8f0;display:flex;flex-direction:column;overflow-y:auto;transition:all .3s}
body.ar .fiche{border-left:none;border-right:1px solid #e2e8f0}
.fiche.hidden{display:none!important}
.fiche-hdr{padding:16px 18px;background:linear-gradient(135deg,var(--b1),var(--b2));position:relative;flex-shrink:0}
.fh-row{display:flex;align-items:center;gap:13px}
body.ar .fh-row{flex-direction:row-reverse;text-align:right}
.fh-av{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:900;color:#fff;border:2.5px solid rgba(255,255,255,.3)}
.fh-name{font-size:14px;font-weight:900;color:#fff;margin-bottom:3px}
.fh-sub{font-size:11.5px;color:rgba(255,255,255,.55)}
.fclose{position:absolute;top:10px;right:10px;background:rgba(255,255,255,.15);border:none;border-radius:7px;color:#fff;width:26px;height:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px}
body.ar .fclose{right:auto;left:10px}
.fclose:hover{background:rgba(255,255,255,.28)}
.fiche-body{padding:16px;flex:1}
.fsec{margin-bottom:16px}
.fsec-t{font-size:10px;font-weight:800;color:var(--sl);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:9px;display:flex;align-items:center;gap:5px}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.fi-item{background:#f8fafc;border-radius:8px;padding:8px 11px}
.fi-lbl{font-size:10px;color:var(--sl);font-weight:600;margin-bottom:2px}
.fi-val{font-size:12.5px;font-weight:700;color:var(--tx)}
.pres-track{height:7px;background:#f1f5f9;border-radius:4px;overflow:hidden;margin-bottom:8px}
.pres-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--emerald),#34D399)}
.months{display:grid;grid-template-columns:repeat(6,1fr);gap:3px}
.md{height:22px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff}
.fiche-foot{padding:12px 16px;border-top:1px solid #f1f5f9;display:flex;gap:8px;flex-shrink:0}
body.ar .fiche-foot{flex-direction:row-reverse}
.fbt{flex:1;padding:9px;font-size:12.5px;font-weight:800;border-radius:9px;border:none;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .2s}
.fbt-p{background:linear-gradient(135deg,var(--b4),var(--b3));color:#fff;box-shadow:0 3px 10px rgba(30,86,200,.22)}
.fbt-s{background:var(--b10);color:var(--b4);border:1.5px solid var(--b8)}
.fbt:hover{transform:translateY(-1px)}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;font-size:14px;font-weight:700;border-radius:9px;border:1.5px solid var(--b8);background:var(--b10);color:var(--b4);cursor:pointer;font-family:inherit;transition:all .2s;white-space:nowrap}
.btn:hover{background:var(--b9)}
.btn.pri{background:linear-gradient(135deg,var(--b4),var(--b3));color:#fff;border-color:transparent;box-shadow:0 3px 10px rgba(30,86,200,.22)}
.btn.pri:hover{box-shadow:0 5px 16px rgba(30,86,200,.32);transform:translateY(-1px)}
.btn.teal{background:linear-gradient(135deg,var(--teal),var(--teal-dark));color:#fff;border-color:transparent;box-shadow:0 3px 10px rgba(15,110,86,.22)}
.btn.purple{background:linear-gradient(135deg,var(--purple),#3C3489);color:#fff;border-color:transparent}

/* TOOLBAR */
.toolbar{background:#fff;border-bottom:1px solid #e2e8f0;padding:10px 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;position:sticky;top:0;z-index:30;flex-shrink:0}
body.ar .toolbar{flex-direction:row-reverse}
.search-box{display:flex;align-items:center;gap:7px;padding:7px 13px;border:1.5px solid #e2e8f0;border-radius:10px;background:#fafbfc;flex:1;max-width:300px;transition:border-color .2s}
.search-box:focus-within{border-color:var(--b4)}
.search-box input{border:none;outline:none;background:transparent;font-size:13px;font-family:'Cairo',sans-serif;color:var(--tx);width:100%}
body.ar .search-box input{font-family:'Tajawal',sans-serif;text-align:right}
.fsel{padding:7px 12px;border:1.5px solid #e2e8f0;border-radius:9px;font-size:12.5px;font-family:'Cairo',sans-serif;color:var(--tx);background:#fafbfc;outline:none;cursor:pointer}
body.ar .fsel{font-family:'Tajawal',sans-serif}
.cntbdg{font-size:12px;font-weight:800;padding:4px 11px;border-radius:12px;background:var(--b9);color:var(--b3)}

/* TABS */
.tabs{background:#fff;border-bottom:1px solid #e2e8f0;padding:0 20px;display:flex;gap:2px;flex-shrink:0}
body.ar .tabs{flex-direction:row-reverse}
.tab{padding:10px 16px;font-size:13px;font-weight:700;color:var(--sl);cursor:pointer;border-bottom:3px solid transparent;border-top:none;border-left:none;border-right:none;background:none;font-family:inherit;transition:all .2s;white-space:nowrap;display:flex;align-items:center;gap:6px}
.tab:hover{color:var(--tx)}
.tab.act{color:var(--b4);border-bottom-color:var(--b4)}

/* CHARTS */
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
.chart-card{background:#fff;border:1px solid #e2e8f0;border-radius:14px;overflow:hidden}
.cc-hd{padding:12px 16px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;justify-content:space-between}
body.ar .cc-hd{flex-direction:row-reverse}
.cc-t{font-size:13.5px;font-weight:800;color:var(--tx);display:flex;align-items:center;gap:7px}
.cc-b{font-size:10px;padding:2px 7px;border-radius:6px;font-weight:800}
.cc-body{padding:14px}
.cc-foot{padding:9px 16px;background:#f8fafc;border-top:1px solid #f1f5f9;display:flex;gap:12px;flex-wrap:wrap}
body.ar .cc-foot{flex-direction:row-reverse}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--sl);font-weight:600}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.full-chart{grid-column:1/-1}

/* ASSOC GRID */
.assoc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px}
.ac{background:var(--b10);border:1px solid var(--b8);border-radius:12px;padding:12px 14px;border-left:4px solid var(--b4);cursor:pointer;transition:all .2s}
body.ar .ac{border-left:none;border-right:4px solid var(--b4)}
.ac:hover{border-color:var(--b5);box-shadow:0 4px 14px rgba(30,86,200,.12);transform:translateY(-2px)}
.ac-nm{font-size:12.5px;font-weight:800;color:var(--tx);margin-bottom:4px;line-height:1.3}
.ac-meta{font-size:11px;color:var(--sl);margin-bottom:7px}
.ac-stats{display:flex;gap:10px}
.ac-sv{font-size:15px;font-weight:900;color:var(--b3);line-height:1}
.ac-sl{font-size:10px;color:var(--sl);margin-top:1px}

/* FORMATEUR CARDS */
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.fc{background:#fff;border:1px solid #e2e8f0;border-radius:14px;overflow:hidden;transition:all .2s;cursor:pointer}
.fc:hover{box-shadow:0 4px 18px rgba(30,86,200,.1);transform:translateY(-2px)}
.fc-top{padding:16px;display:flex;align-items:flex-start;gap:13px;border-bottom:1px solid #f1f5f9}
body.ar .fc-top{flex-direction:row-reverse;text-align:right}
.fc-av{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:900;color:#fff;flex-shrink:0}
.fc-nm{font-size:13.5px;font-weight:800;color:var(--tx);margin-bottom:3px}
.fc-sub{font-size:11.5px;color:var(--sl);margin-bottom:5px}
.fc-bdgs{display:flex;gap:5px;flex-wrap:wrap}
body.ar .fc-bdgs{flex-direction:row-reverse}
.fc-stats{padding:12px 16px;display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.fcs-v{font-size:17px;font-weight:900;color:var(--b3);text-align:center}
.fcs-l{font-size:10px;color:var(--sl);text-align:center;margin-top:2px}
.fc-bot{padding:10px 16px;border-top:1px solid #f1f5f9;display:flex;align-items:center;justify-content:space-between}
body.ar .fc-bot{flex-direction:row-reverse}
.cert-s{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:700}
.cert-dot{width:7px;height:7px;border-radius:50%}

/* CAL */
.cal-week{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:3px}
.cal-dn{text-align:center;font-size:10px;font-weight:700;color:var(--sl);padding:4px;text-transform:uppercase}
.cal-day{height:38px;border-radius:7px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--tx);cursor:pointer;transition:background .15s;position:relative}
.cal-day:hover{background:var(--b10)}
.cal-day.today{background:var(--b4);color:#fff;box-shadow:0 2px 8px rgba(30,86,200,.3)}
.cal-day.has-ev{background:var(--b9);color:var(--b3)}
.cal-day.has-ev::after{content:'';position:absolute;bottom:3px;width:4px;height:4px;border-radius:50%;background:var(--b4)}
.cal-day.empty{opacity:0;pointer-events:none}
.ev-list{margin-top:12px;display:flex;flex-direction:column;gap:6px}
.ev-item{display:flex;align-items:center;gap:11px;padding:9px 13px;background:var(--b10);border-radius:9px;border-left:3px solid var(--b4)}
body.ar .ev-item{flex-direction:row-reverse;border-left:none;border-right:3px solid var(--b4)}
.ev-dt{font-size:12px;font-weight:800;color:var(--b3);white-space:nowrap}
.ev-t{font-size:13px;font-weight:700;color:var(--tx)}
.ev-s{font-size:11px;color:var(--sl);margin-top:2px}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(2,11,24,.7);backdrop-filter:blur(4px);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:18px;width:100%;max-width:460px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.25);animation:fadeUp .25s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.modal-top{padding:16px 20px;display:flex;align-items:center;justify-content:space-between}
.modal-top h3{font-size:15px;font-weight:900;color:#fff}
.modal-close{background:rgba(255,255,255,.15);border:none;border-radius:8px;color:#fff;width:28px;height:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px}
.modal-close:hover{background:rgba(255,255,255,.28)}
.modal-body{padding:22px}
.attest-card{background:linear-gradient(135deg,#f0f9ff,var(--b10));border:1.5px solid var(--b8);border-radius:13px;padding:20px;text-align:center;margin-bottom:16px}
.at-ico{font-size:32px;margin-bottom:8px}
.at-t{font-size:13px;font-weight:800;color:var(--b3);margin-bottom:4px}
.at-name{font-size:18px;font-weight:900;color:var(--tx);margin-bottom:4px}
.at-detail{font-size:11.5px;color:var(--sl);line-height:1.6;white-space:pre-line}
.modal-acts{display:flex;gap:9px}
.ma{flex:1;padding:10px;font-size:13px;font-weight:800;border-radius:10px;border:none;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:7px;transition:all .2s}
.ma:hover{transform:translateY(-1px)}
.ma-p{background:linear-gradient(135deg,var(--teal),var(--teal-dark));color:#fff}
.ma-s{background:var(--b10);color:var(--b4);border:1.5px solid var(--b8)}

/* API STATUS */
.api-s{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;padding:4px 10px;border-radius:10px}
.api-s.loading{background:rgba(245,158,11,.15);color:#F59E0B}
.api-s.ok{background:rgba(5,150,105,.15);color:var(--emerald)}
.api-s.err{background:rgba(225,29,72,.15);color:var(--rose)}
.api-s.demo{background:rgba(83,74,183,.12);color:var(--purple)}
.api-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.api-dot.loading{background:#F59E0B;animation:pulse 1.2s infinite}
.api-dot.ok{background:var(--emerald)}
.api-dot.err{background:var(--rose)}
.api-dot.demo{background:var(--purple)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* QUICK MODULES */
/* QM DROPDOWN OVERLAY */
.qm-dropdown{position:absolute;top:100%;left:0;right:0;z-index:100;background:#fff;border-bottom:2px solid var(--b4);box-shadow:0 8px 32px rgba(0,0,0,.15);display:none;padding:16px 24px}
.qm-dropdown.open{display:block;animation:fadeDown .2s ease}
@keyframes fadeDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.qm-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}
.qm{background:#fff;border:1.5px solid #e2e8f0;border-radius:14px;padding:18px 10px;cursor:pointer;transition:all .2s;border-top:5px solid var(--b4);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.qm:hover{box-shadow:0 6px 20px rgba(30,86,200,.12);transform:translateY(-3px);border-color:var(--b8)}
.qm-ico{font-size:32px;margin-bottom:8px}
.qm-t{font-size:13px;font-weight:900;color:var(--tx);margin-bottom:3px;line-height:1.3}
.qm-s{font-size:11px;color:var(--sl);line-height:1.4}
.ni-modules{color:var(--cy)!important;border-bottom-color:transparent!important}
.ni-modules.open{border-bottom-color:var(--cy)!important}

/* USERS MODULE */
.utab{padding:10px 18px;font-size:13px;font-weight:700;color:var(--sl);cursor:pointer;border-bottom:3px solid transparent;border-top:none;border-left:none;border-right:none;background:none;font-family:inherit;transition:all .2s;display:flex;align-items:center;gap:7px}
.utab:hover{color:var(--tx)}
.utab.act{color:var(--b4);border-bottom-color:var(--b4)}
.rb-admin{background:#EEEDFE;color:var(--purple)}
.rb-sous{background:var(--b9);color:var(--b3)}
.rb-oper{background:#E1F5EE;color:var(--teal)}
.mu-body{padding:22px;display:grid;grid-template-columns:1fr 1fr;gap:14px}
.mu-full{grid-column:1/-1}
.mu-label{font-size:12px;font-weight:700;color:var(--sl);margin-bottom:6px;display:block}
.mu-input{width:100%;padding:10px 13px;border:1.5px solid #e2e8f0;border-radius:9px;font-size:13.5px;font-family:'Cairo',sans-serif;color:var(--tx);background:#fafbfc;outline:none;transition:border-color .2s}
.mu-input:focus{border-color:var(--b4);box-shadow:0 0 0 3px rgba(30,86,200,.1)}
body.ar .mu-input{font-family:'Tajawal',sans-serif;text-align:right}
.mu-select{width:100%;padding:10px 13px;border:1.5px solid #e2e8f0;border-radius:9px;font-size:13.5px;font-family:'Cairo',sans-serif;color:var(--tx);background:#fafbfc;outline:none;cursor:pointer;appearance:none;transition:border-color .2s}
.mu-select:focus{border-color:var(--b4)}
body.ar .mu-select{font-family:'Tajawal',sans-serif}
.mu-foot{padding:14px 22px;border-top:1px solid #f1f5f9;display:flex;gap:10px;justify-content:flex-end}
body.ar .mu-foot{flex-direction:row-reverse}
.st-btn{flex:1;padding:8px;border-radius:8px;border:1.5px solid #e2e8f0;background:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:5px}
.st-btn.sel-a{background:#DCFCE7;border-color:#86EFAC;color:#166534}
.st-btn.sel-i{background:#FEE2E2;border-color:#FCA5A5;color:#991B1B}
.st-btn.sel-p{background:#FEF3C7;border-color:#FCD34D;color:#92400E}
.toast{position:fixed;bottom:24px;right:24px;z-index:500;padding:12px 20px;border-radius:11px;font-size:13px;font-weight:700;color:#fff;display:flex;align-items:center;gap:8px;box-shadow:0 6px 24px rgba(0,0,0,.2);animation:fadeUp .3s ease;pointer-events:none}
body.ar .toast{right:auto;left:24px}
.toast.ok{background:var(--emerald)}
.toast.err{background:var(--rose)}

/* FOOTER */
.ftr{background:var(--b0);padding:10px 24px;display:flex;align-items:center;justify-content:space-between;border-top:2px solid var(--b4);flex-shrink:0}
body.ar .ftr{flex-direction:row-reverse}
.ftr p{font-size:11px;color:rgba(255,255,255,.22)}
.fbr{font-size:12px;color:var(--b6);font-weight:800}
.flb{font-size:10px;padding:2px 8px;border-radius:4px;background:rgba(59,130,246,.15);color:var(--b6);border:1px solid rgba(96,165,250,.25);font-weight:800;letter-spacing:1px}

/* DETAIL CARDS */
.dcards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.dc{background:#fff;border:1px solid #e2e8f0;border-radius:13px;padding:20px 20px;display:flex;align-items:center;gap:16px;border-top:4px solid var(--b5);transition:box-shadow .2s}
body.ar .dc{flex-direction:row-reverse}
.dc:nth-child(2){border-top-color:var(--cy)}
.dc:nth-child(3){border-top-color:var(--b3)}
.dc:hover{box-shadow:0 4px 14px rgba(30,86,200,.08)}
.dic{width:44px;height:44px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.dic1{background:var(--b9)}.dic2{background:#cffafe}.dic3{background:#ede9fe}
.dv{font-size:30px;font-weight:900;color:var(--tx)}
.dl{font-size:14px;color:var(--sl);font-weight:600}
</style>
</head>

/* ═══════════════════════════════════
   LANGUE
   ═══════════════════════════════════ */
function setLang(l){
  lang=l;
  document.body.classList.toggle('ar',l==='ar');
  ['bfr-l','bfr-m'].forEach(id=>{if(g(id))g(id).classList.toggle('on',l==='fr')});
  ['bar-l','bar-m'].forEach(id=>{if(g(id))g(id).classList.toggle('on',l==='ar')});
  const t=T[l];
  // LOGIN
  ['ll-l','ll-m'].forEach(id=>st(id,t.lEmail.includes('e-mail')?'Langue :':'اللغة :'));
  st('l-sur',t.lSur);st('l-title',t.lTitle);
  st('rn-a',t.rnA);st('rn-s',t.rnS);st('rn-o',t.rnO);
  st('rl-a',t.rlA);st('rl-s',t.rlS);st('rl-o',t.rlO);
  st('l-email-lbl',t.lEmail);st('l-pwd-lbl',t.lPwd);st('l-btn-lbl',t.lBtn);
  st('l-tfa',t.lTfa);st('l-foot',t.lFoot);
  // MAIN
  st('m-sur',t.mSur);st('m-t1',t.mT1);st('m-t2',t.mT2);st('m-bdg',t.mBdg);
  st('n-home',t.nHome);st('n-app',t.nApp);st('n-form',t.nForm);st('n-rap',t.nRap);
  st('n-assoc',t.nAssoc);st('n-admin-finance',t.nAdminFin);st('n-partenaire',t.nPartenaire);
  st('n-users',t.nUsers);st('n-ctr',t.nCtr);st('n-ins',t.nIns);st('n-form-ext',t.nFormExt);st('n-out',t.nOut);
  st('sb-t',t.sbT);st('sb-s',t.sbS);st('si-out',t.siOut);
  for(let i=1;i<=4;i++){st('kl'+i,t.kl[i-1]);st('kd'+i,t.kd[i-1]);}
  st('m-foot',t.mFoot);st('at-print',t.printLbl);st('at-close',t.closeLbl);
  updateBand();drawSidebar();
  if(session) renderMod(curMod);
}

/* ═══════════════════════════════════
   LOGIN
   ═══════════════════════════════════ */
function selectRole(r){
  loginRole=r;
  ['admin','sous','oper'].forEach(x=>{
    const btn=g('rb-'+x);if(!btn)return;
    const active=x===r;
    const bc={admin:'#534AB7',sous:'var(--b4)',oper:'#0F6E56'};
    const bg={admin:'#F5F4FF',sous:'var(--b10)',oper:'#F0FAF7'};
    btn.style.borderColor=active?bc[x]:'#e2e8f0';
    btn.style.background=active?bg[x]:'#fff';
  });
  updateBand();
}

function updateBand(){
  const t=T[lang];
  const cols={admin:'linear-gradient(135deg,#3C3489,#534AB7)',sous:'linear-gradient(135deg,var(--b3),var(--b4))',oper:'linear-gradient(135deg,var(--teal-dark),var(--teal))'};
  const band=g('band-l');if(band)band.style.background=cols[loginRole];
  st('band-ico',t.bico[loginRole]);st('band-t',t.band[loginRole]);st('band-s',t.bsub[loginRole]);
  const btn=g('l-btn');if(btn)btn.style.background=cols[loginRole];
}

function clearErr(){const e=g('l-err');if(e)e.style.display='none';}

function doLogin(){
  const t=T[lang];
  const email=g('l-email').value.trim();
  const pwd=g('l-pwd').value;
  const setErr=msg=>{g('l-errmsg').textContent=msg;g('l-err').style.display='flex';};
  if(!email){setErr(t.errEmail);return;}
  if(!pwd){setErr(t.errPwd);return;}
  const acc=ACCOUNTS[email];
  if(!acc||acc.pwd!==pwd||acc.role!==loginRole){setErr(t.errCreds);return;}
  // Session avec cloisonnement région/centre
  session={
    email,
    role:acc.role,
    name:lang==='ar'?acc.nameAr:acc.nameFr,
    region:acc.region,   // null = accès national (admin)
    centre:acc.centre,   // null = accès toute la région (sous-admin)
  };
  // Forcer la région pour sous-admin et opérateur
  if(session.region!==null) curReg=session.region;
  g('page-login').classList.remove('active');
  g('page-main').classList.add('active');
  st('m-user',session.name);
  st('si-role',T[lang].band[session.role]);
  st('si-nm',session.name);
  updateNavUsers();
  // Afficher la restriction d'accès
  const siAcc=g('si-access');
  if(siAcc){
    if(session.role==='admin'){
      siAcc.textContent=lang==='ar'?'🌍 صلاحية كاملة — 12 جهة':'🌍 Accès complet — 12 régions';
    } else if(session.role==='sous'){
      const rn=REGIONS[lang].find(r=>r.id===session.region);
      siAcc.textContent=(lang==='ar'?'📍 مقيّد: ':'📍 Limité: ')+(rn?rn.s:'');
    } else {
      siAcc.textContent=(lang==='ar'?'🏢 مركزك: ':'🏢 Votre centre: ')+getCentreName(session.centre);
    }
  }
  updateKPIs();drawSidebar();
  goMod('home',g('ni-home'));
}

function doLogout(){
  session=null;curReg=null;selApp=null;rawRows=[];usingDemo=false;
  g('page-main').classList.remove('active');
  g('page-login').classList.add('active');
  g('l-email').value='';g('l-pwd').value='';
}

/* ═══════════════════════════════════
   KPIs
   ═══════════════════════════════════ */
function updateKPIs(rs){
  let regs;
  if(rs){
    regs=rs;
  } else if(session&&session.region!==null){
    // Sous-admin ou opérateur : uniquement sa région
    regs=REGIONS[lang].filter(r=>r.id===session.region);
  } else {
    regs=REGIONS[lang]; // admin : tout
  }
  g('kv1').textContent=regs.reduce((s,r)=>s+r.e,0);
  g('kv2').textContent=regs.reduce((s,r)=>s+r.a,0).toLocaleString('fr-FR');
  g('kv3').textContent=regs.reduce((s,r)=>s+r.f,0);
  g('kv4').textContent='71%';
}

/* ═══════════════════════════════════
   SIDEBAR
   ═══════════════════════════════════ */
function drawSidebar(){
  const list=g('rlist');if(!list)return;
  list.innerHTML='';
  const t=T[lang];
  REGIONS[lang].forEach(r=>{
    // Cloisonnement : sous-admin et opérateur ne voient que leur région
    const isAllowed = !session || session.region===null || session.region===r.id;
    if(!isAllowed) return; // masquer les autres régions

    const btn=document.createElement('button');
    btn.className='rbtn'+(curReg===r.id?' on':'');
    // Opérateur : afficher aussi le centre
    const centreLabel = session&&session.centre&&session.region===r.id
      ? `<span style="font-size:9px;color:rgba(255,255,255,.4);display:block;margin-top:1px">${getCentreName(session.centre)}</span>` : '';
    btn.innerHTML=`<div class="rnum">${r.id}</div>
      <div class="rnfo">
        <div class="rnm">${r.n}</div>
        <div class="rsub">${r.e} ${lang==='ar'?'جمعية':'assoc.'} · ${r.a.toLocaleString('fr-FR')}</div>
        ${centreLabel}
      </div>
      <span class="rcnt">${r.e}</span>`;
    // Opérateur ne peut pas changer de région
    if(session&&session.role==='oper'){
      btn.style.cursor='default';
      btn.style.opacity='1';
    } else {
      btn.onclick=()=>{curReg=r.id;updateKPIs([r]);drawSidebar();if(curMod==='home')renderMod('home');};
    }
    list.appendChild(btn);
  });

  // Badge d'accès en bas de sidebar
  const accessInfo=document.createElement('div');
  accessInfo.style.cssText='padding:10px 14px;margin:6px 10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:9px;font-size:10.5px;color:rgba(255,255,255,.35);line-height:1.6';
  if(session){
    const roleColor={admin:'var(--cy)',sous:'var(--b6)',oper:'#5DCAA5'};
    const accessDesc = session.role==='admin'
      ? (lang==='ar'?'صلاحية كاملة — 12 جهة':'Accès complet — 12 régions')
      : session.role==='sous'
      ? (lang==='ar'?`مقيّد: ${REGIONS[lang].find(r=>r.id===session.region)?.s||''}`:`Limité: ${REGIONS.fr.find(r=>r.id===session.region)?.s||''}`)
      : (lang==='ar'?`مقيّد: ${getCentreName(session.centre)}`:`Limité: ${getCentreName(session.centre)}`);
    accessInfo.innerHTML=`<i class="ti ti-shield-check" style="color:${roleColor[session.role]};font-size:13px;vertical-align:-2px;margin-${lang==='ar'?'left':'right'}:5px"></i>${accessDesc}`;
  }
  list.appendChild(accessInfo);
}

function getCentreName(centreId){
  const centres={
    c01:'Casa Aïn Chock',c02:'Casa Hay Mohammadi',
    c03:'Rabat Centre',c04:'Salé',
    c05:'Fès Médina',c06:'Meknès',
    c07:'Marrakech',c08:'Agadir'
  };
  return centres[centreId]||centreId;
}

function goMod(m,btn){
  curMod=m;selApp=null;
  document.querySelectorAll('.nav .ni:not(.ext)').forEach(n=>n.classList.remove('act'));
  if(btn)btn.classList.add('act');
  renderMod(m);
}

/* ═══════════════════════════════════
   RENDER MODULE
   ═══════════════════════════════════ */
function renderMod(m){
  const mc=g('mod-content');if(!mc)return;
  const t=T[lang];
  mc.innerHTML='';
  if(m==='home') renderHome(mc,t);
  else if(m==='app') renderApp(mc,t);
  else if(m==='form') renderForm(mc,t);
  else if(m==='rap') renderRap(mc,t);
  else if(m==='users'){
    if(!session||session.role!=='admin'){mc.innerHTML=`<div style="padding:40px;text-align:center;color:var(--rose)"><i class="ti ti-lock" style="font-size:36px;display:block;margin:0 auto 12px"></i><p>${lang==='ar'?'غير مصرح لك':'Accès refusé'}</p></div>`;return;}
    renderUsers(mc,t);
  }
  else if(m==='assoc'){mc.innerHTML='<div class="mod-area">'+renderAssocContent(t)+'</div>';}
  else if(m==='admin_finance') renderAdminFinance(mc,t);
  else if(m==='partenaire') renderPartenaire(mc,t);
  else mc.innerHTML=`<div style="padding:40px;text-align:center;color:var(--sl)"><i class="ti ti-tools" style="font-size:36px;display:block;margin:0 auto 12px;opacity:.3"></i><p style="font-size:14px">${lang==='ar'?'قريباً':'Bientôt disponible'}</p></div>`;
}

/* ── Mapping région/centre vers les foj (données démo) ── */
const REGION_FOJ={
  1:['فوج 1'],2:['فوج 2'],3:['فوج 1','فوج 2'],4:['فوج 1','فوج 2'],
  5:['فوج 3'],6:['فوج 1','فوج 2'],7:['فوج 2','فوج 3'],
  8:['فوج 3'],9:['فوج 1'],10:['فوج 2'],11:['فوج 1'],12:['فوج 3'],
};
const CENTRE_FOJ={
  c01:['فوج 1'],c02:['فوج 2'],c03:['فوج 1'],c04:['فوج 2'],
  c05:['فوج 1'],c06:['فوج 3'],c07:['فوج 2'],c08:['فوج 1'],
};

function filterRowsByRole(rows){
  if(!session||session.role==='admin') return rows; // Admin voit tout

  if(session.role==='sous'&&session.region){
    // Sous-admin : filtrer par foj de sa région (col 2)
    const allowed=REGION_FOJ[session.region]||[];
    if(allowed.length===0) return rows;
    return rows.filter(r=>{
      const foj=(r[2]||'').toString().trim();
      return allowed.includes(foj)||foj===''; // garder si foj inconnu
    });
  }

  if(session.role==='oper'&&session.centre){
    // Opérateur : filtrer par foj de son centre (col 2)
    const allowed=CENTRE_FOJ[session.centre]||[];
    if(allowed.length===0) return rows;
    return rows.filter(r=>{
      const foj=(r[2]||'').toString().trim();
      return allowed.includes(foj)||foj==='';
    });
  }

  return rows;
}

}

function processRapData(rows){
  /* Structure Sheet RAE2C :
     0:Horodateur | 1:Email | 2:Foj | 3:Saison | 4:DateNais | 5:NomAR | 6:NomFR | 7:Niveau | 8:NiveauGJ | 9:Métier */
  const COL={foj:2,saison:3,nais:4,nomAR:5,nomFR:6,niv:7,nivGJ:8,metier:9};
  const foj={},sexe={F:0,H:0},age={'≤17':0,'18–20':0,'21–24':0,'25–30':0,'31+':0},niv={},br={};
  let totalAge=0,ageN=0;

  rows.forEach(row=>{
    // Foj
    const f=(row[COL.foj]||'').toString().trim();
    if(f)foj[f]=(foj[f]||0)+1;

    // Sexe — déduction par terminaison du prénom arabe (ة = féminin)
    const nomAR=(row[COL.nomAR]||'').toString().trim();
    const nomFR=(row[COL.nomFR]||'').toString().trim().toLowerCase();
    if(nomAR.endsWith('ة')||nomAR.endsWith('ى')||nomFR.match(/^(fatima|zineb|meryem|nadia|sara|laila|khadija|amal|hafsa|souad|nour|hana|rihab|rim|aya)/))
      sexe.F++;
    else sexe.H++;

    // Âge
    const nb=(row[COL.nais]||'').toString().trim();
    const parts=nb.split('/');
    if(parts.length===3){
      const yr=parseInt(parts[2]);
      if(yr>1950&&yr<2020){
        const a=new Date().getFullYear()-yr;
        totalAge+=a;ageN++;
        if(a<=17)age['≤17']++;
        else if(a<=20)age['18–20']++;
        else if(a<=24)age['21–24']++;
        else if(a<=30)age['25–30']++;
        else age['31+']++;
      }
    }

    // Niveau scolaire
    const n=(row[COL.niv]||'').toString().trim();
    if(n)niv[n]=(niv[n]||0)+1;

    // Branche / Métier
    const b=(row[COL.metier]||'').toString().trim();
    if(b)br[b]=(br[b]||0)+1;
  });

  return{foj,sexe,age,niv,br,total:rows.length,moyAge:ageN>0?Math.round(totalAge/ageN):0};
}

function drawCharts(d,t){
  const COLORS=['#1E56C8','#06B6D4','#059669','#D97706','#E11D48','#534AB7','#0F6E56','#F59E0B','#10B981','#3B82F6'];

  // ── Sexe (donut) ──
  if(g('ch-sexe')){
    const F=d.sexe.F,H=d.sexe.H,tot=F+H;
    rapCharts.sexe=new Chart(g('ch-sexe').getContext('2d'),{
      type:'doughnut',
      data:{labels:t.sexeLabels,datasets:[{data:[F,H],backgroundColor:['#E11D48','#1E56C8'],borderWidth:2,borderColor:'#fff',hoverOffset:5}]},
      options:{cutout:'65%',plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.label}: ${c.raw} (${tot?Math.round(c.raw/tot*100):0}%)`}}}}
    });
    const lg=g('leg-sexe');if(lg)lg.innerHTML=
      '<div class="leg"><div class="leg-dot" style="background:#E11D48"></div>'+t.sexeLabels[0]+': <strong>'+F+'</strong></div>'+
      '<div class="leg"><div class="leg-dot" style="background:#1E56C8"></div>'+t.sexeLabels[1]+': <strong>'+H+'</strong></div>';
  }

  // ── Âge (bar) ──
  if(g('ch-age')){
    const labels=Object.keys(d.age);
    const vals=labels.map(k=>d.age[k]);
    const ageColors=['#1E56C8','#3B82F6','#06B6D4','#10B981','#D97706'];
    rapCharts.age=new Chart(g('ch-age').getContext('2d'),{
      type:'bar',
      data:{labels,datasets:[{data:vals,backgroundColor:ageColors,borderRadius:5,borderSkipped:false}]},
      options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{grid:{display:false}},y:{grid:{color:'#f1f5f9'},ticks:{stepSize:1}}}}
    });
    const lg=g('leg-age');
    if(lg)lg.innerHTML=labels.map((l,i)=>'<div class="leg"><div class="leg-dot" style="background:'+ageColors[i]+'"></div>'+l+': <strong>'+vals[i]+'</strong></div>').join('');
  }

  // ── Niveau scolaire (barres horizontales) ──
  if(g('ch-niv')){
    const entries=Object.entries(d.niv).filter(([k])=>k).sort((a,b)=>b[1]-a[1]);
    rapCharts.niv=new Chart(g('ch-niv').getContext('2d'),{
      type:'bar',
      data:{labels:entries.map(([k])=>k),datasets:[{data:entries.map(([,v])=>v),backgroundColor:['#059669','#10B981','#34D399','#6EE7B7','#A7F3D0'],borderRadius:4}]},
      options:{indexAxis:'y',responsive:true,plugins:{legend:{display:false}},scales:{x:{grid:{color:'#f1f5f9'},ticks:{stepSize:1}},y:{grid:{display:false},ticks:{font:{size:10}}}}}
    });
  }

  // ── Branche / Métier (barres horizontales) ──
  if(g('ch-br')){
    const entries=Object.entries(d.br).filter(([k])=>k).sort((a,b)=>b[1]-a[1]);
    rapCharts.br=new Chart(g('ch-br').getContext('2d'),{
      type:'bar',
      data:{labels:entries.map(([k])=>k),datasets:[{data:entries.map(([,v])=>v),backgroundColor:['#534AB7','#7C3AED','#A78BFA','#1E56C8','#3B82F6','#E11D48','#D97706','#059669','#06B6D4'],borderRadius:4}]},
      options:{indexAxis:'y',responsive:true,plugins:{legend:{display:false}},scales:{x:{grid:{color:'#f1f5f9'},ticks:{stepSize:1}},y:{grid:{display:false},ticks:{font:{size:10}}}}}
    });
  }

  // ── Foj / Associations (bar) ──
  if(g('ch-assoc')){
    const entries=Object.entries(d.foj).filter(([k])=>k).sort((a,b)=>b[1]-a[1]);
    rapCharts.assoc=new Chart(g('ch-assoc').getContext('2d'),{
      type:'bar',
      data:{labels:entries.map(([k])=>k),datasets:[{data:entries.map(([,v])=>v),backgroundColor:'#1E56C8',borderRadius:5}]},
      options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{font:{size:10}}},y:{grid:{color:'#f1f5f9'},ticks:{stepSize:1}}}}
    });
  }
}

async function loadSheet(){
  const t=T[lang];
  const stat=g('api-status');
  if(stat){stat.className='api-s loading';stat.innerHTML=`<div class="api-dot loading"></div>${t.apiLoad}`;}
  const range=encodeURIComponent('Réponses au formulaire 1!A1:J2000');
  const url=`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${range}?key=${API_KEY}`;
  try{
    const res=await fetch(url);
    if(!res.ok)throw new Error('HTTP '+res.status);
    const data=await res.json();
    const rows=(data.values||[]).slice(1);
    if(rows.length>0){rawRows=rows;usingDemo=false;localStorage.setItem('rae2c_api_key',API_KEY);}
    else{rawRows=[];usingDemo=true;}
    if(stat){stat.className=`api-s ${usingDemo?'demo':'ok'}`;stat.innerHTML=`<div class="api-dot ${usingDemo?'demo':'ok'}"></div>${usingDemo?t.apiDemo:t.apiOk}`;}
    destroyCharts();renderMod('rap');
  }catch(e){
    usingDemo=true;
    if(stat){stat.className='api-s err';stat.innerHTML=`<div class="api-dot err"></div>${t.apiErr}`;}
    destroyCharts();renderMod('rap');
  }
}

function exportRap(){
  const t=T[lang];
  const rows=rawRows.length?rawRows:getDemoRows();
  let csv='N°;Horodateur;Foj;Saison;Date Naissance;Nom AR;Nom FR;Niveau;Niveau GJ;Métier\n';
  rows.forEach((r,i)=>csv+=`${i+1};${r[0]||''};${r[2]||''};${r[3]||''};${r[4]||''};${r[5]||''};${r[6]||''};${r[7]||''};${r[8]||''};${r[9]||''}\n`);
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);const el=document.createElement('a');
  el.href=url;el.download='RAE2C_Rapports.csv';el.click();URL.revokeObjectURL(url);
}

function saveUser(){
  const t=T[lang];
  const nom=g('mu-nom').value.trim();
  const email=g('mu-email').value.trim().toLowerCase();
  const role=g('mu-role').value;
  const region=g('mu-region').value?parseInt(g('mu-region').value):null;
  const centre=g('mu-centre').value||null;
  const pwd=g('mu-pwd').value.trim();
  if(!nom||!email||!pwd){showToast(lang==='ar'?'أكمل جميع الحقول المطلوبة':'Remplissez tous les champs obligatoires','err');return;}
  if(editingUserId){
    // Modifier
    const u=usersData.find(x=>x.id===editingUserId);
    if(u){
      u.nameFr=nom;u.nameAr=nom;u.email=email;u.role=role;
      u.region=region;u.centre=centre;u.pwd=pwd;u.status=userStatus;
      // Mettre à jour ACCOUNTS
      delete ACCOUNTS[Object.keys(ACCOUNTS).find(k=>ACCOUNTS[k]===Object.values(ACCOUNTS).find(v=>v.pwd===u.pwd&&v.role===u.role))];
      ACCOUNTS[email]={pwd,role,region,centre,nameFr:nom,nameAr:nom};
    }
  } else {
    // Nouveau
    if(ACCOUNTS[email]){showToast(lang==='ar'?'هذا البريد مستخدم':'E-mail déjà utilisé','err');return;}
    const newId=Math.max(...usersData.map(u=>u.id))+1;
    usersData.push({id:newId,email,nameFr:nom,nameAr:nom,role,region,centre,pwd,status:userStatus});
    ACCOUNTS[email]={pwd,role,region,centre,nameFr:nom,nameAr:nom};
  }
  saveAccounts(); // ← persistance localStorage
  closeUserModal();
  showToast(t.successSave,'ok');
  renderMod('users');
}

function deactivateUser(id){
  const t=T[lang];
  if(!confirm(t.confirmDeact))return;
  const u=usersData.find(x=>x.id===id);
  if(u)u.status='inactive';
  showToast(lang==='ar'?'تم تعطيل الحساب':'Compte désactivé','ok');
  renderMod('users');
}

function activateUser(id){
  const u=usersData.find(x=>x.id===id);
  if(u)u.status='active';
  showToast(lang==='ar'?'تم تفعيل الحساب':'Compte activé','ok');
  renderMod('users');
}

function deleteUser(id){
  const t=T[lang];
  if(!confirm(t.confirmDel))return;
  const u=usersData.find(x=>x.id===id);
  if(u){
    delete ACCOUNTS[u.email];
    usersData=usersData.filter(x=>x.id!==id);
    saveAccounts(); // ← persistance localStorage
  }
  showToast(lang==='ar'?'تم حذف الحساب':'Compte supprimé','ok');
  renderMod('users');
}

function closeUserModal(){
  g('modal-users').classList.remove('show');
  editingUserId=null;
}

/* ── Afficher/masquer le mot de passe ── */
function togglePwd(id, pwd){
  const el=document.getElementById('pwd-'+id);
  if(!el)return;
  if(el.textContent==='••••••••'){
    el.textContent=pwd;
    el.style.color='var(--tx)';
    el.style.letterSpacing='normal';
  } else {
    el.textContent='••••••••';
    el.style.color='var(--sl)';
    el.style.letterSpacing='2px';
  }
}

/* ── Copier le mot de passe ── */
function copyPwd(pwd){
  navigator.clipboard.writeText(pwd).then(()=>{
    showToast(lang==='ar'?'تم نسخ كلمة المرور':'Mot de passe copié ✓','ok');
  }).catch(()=>{
    // Fallback si clipboard API indisponible
    const el=document.createElement('textarea');
    el.value=pwd;el.style.position='fixed';el.style.opacity='0';
    document.body.appendChild(el);el.select();
    document.execCommand('copy');document.body.removeChild(el);
    showToast(lang==='ar'?'تم نسخ كلمة المرور':'Mot de passe copié ✓','ok');
  });
}

/* ── Toast notification ── */
function showToast(msg,type='ok'){
  const el=document.createElement('div');
  el.className=`toast ${type}`;
  el.innerHTML=`<i class="ti ${type==='ok'?'ti-check':'ti-alert-circle'}"></i>${msg}`;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),3000);
}


selectRole('admin');
setLang('fr');
